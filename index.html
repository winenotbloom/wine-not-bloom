<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Not Bloom | Curated Wine & Floral Experiences</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F9F7F2; scroll-behavior: smooth; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        .bg-bordeaux { background-color: #4A0E0E; }
        .text-bordeaux { color: #4A0E0E; }
        .bg-moss { background-color: #3E4C33; }
        .text-moss { color: #3E4C33; }
        
        /* Flip Card Logic */
        .flip-card { perspective: 1000px; height: 500px; cursor: pointer; transition: opacity 0.5s ease; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .flip-card.active .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 4px; overflow: hidden; }
        .flip-card-back { background-color: #F1ECE3; transform: rotateY(180deg); display: flex; flex-direction: column; justify-content: center; padding: 30px; border: 2px solid #4A0E0E; }

        /* Status de Seleção */
        .faded { opacity: 0.3 !important; filter: blur(1px); pointer-events: none; }
        .wine-option { transition: all 0.4s ease; border: 1px solid #eee; }
        .wine-option.selected { border: 2px solid #4A0E0E !important; background-color: #fff; font-weight: 600; transform: scale(1.05); }
        .tab-content { display: none; }
        .tab-content.active { display: grid; }
        .tab-btn.active { border-bottom: 2px solid #4A0E0E; color: #4A0E0E; }
    </style>
</head>
